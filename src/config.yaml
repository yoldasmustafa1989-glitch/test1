site:
  name: Vakman de Groot
  site: 'https://www.vakmandegroot.nl' # Update this once you have your real domain
  base: '/'
  trailingSlash: false

  # Remove or update this if you have your own Google Search Console ID
  googleSiteVerificationId: null 

# Default SEO metadata
metadata:
  title:
    default: Vakman de Groot · Loodgieter & Installateur Haarlem
    template: '%s — Vakman de Groot'
  description: Uw betrouwbare vakman in Haarlem en Heemstede voor lekkages, CV-ketel onderhoud en complete badkamer renovaties.
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Vakman de Groot
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: null
    site: null
    cardType: summary_large_image

i18n:
  language: nl # Changed to Dutch
  textDirection: ltr

apps:
  blog:
    isEnabled: true # Keep enabled if you want to show 'Projecten' as blog posts
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/projecten/%slug%' # Changed from /blog/ to /projecten/ for better SEO
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'projecten' # This makes your 'Blog' list look like a 'Projecten' list
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'categorie' 
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'onderwerp'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # Add your "G-XXXXXXXXXX" here later to see visitor stats
